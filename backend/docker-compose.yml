# ──────────────────────────────────────────────────────────────────────
#  Relict — local development stack
#
#  Brings up every service the backend needs on a single host.
#  Usage:
#      cp .env.example .env       (fill in real secrets)
#      docker compose up --build
#
#  The compose file is deliberately verbose: health checks, restart
#  policies, volume names, and port mappings are all explicit so a new
#  contributor can read this file and understand the whole topology
#  without reading anything else.
# ──────────────────────────────────────────────────────────────────────

name: relict

services:

  # ─── Postgres 16 ───────────────────────────────────────────────────
  postgres:
    image: postgres:16.6-bookworm
    container_name: relict-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-relict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-relict}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-relict} -d ${POSTGRES_DB:-relict}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - relict-net

  # ─── Redis 7 (RQ queue + pub/sub) ──────────────────────────────────
  redis:
    image: redis:7.4.1-bookworm
    container_name: relict-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1000", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - relict-net

  # ─── MinIO (S3-compatible object storage) ──────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: relict-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"  # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - relict-net

  # ─── One-shot bucket bootstrap ─────────────────────────────────────
  #  Creates the Relict bucket on first startup so the API doesn't have
  #  to handle "bucket doesn't exist" on every request.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: relict-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET} &&
      mc anonymous set none local/$${MINIO_BUCKET} &&
      echo 'MinIO bucket ready: '$${MINIO_BUCKET}
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-relict}
    networks:
      - relict-net
    restart: "no"

  # ─── FastAPI application ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.11.11
    image: relict/api:local
    container_name: relict-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Override host values with service names inside the compose network
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - relict-net

  # ─── RQ Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        PYTHON_VERSION: 3.11.11
    image: relict/worker:local
    container_name: relict-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - worker_workspaces:/workspaces
      - ./data/references:/data/references:ro
    networks:
      - relict-net

  # ─── Adminer (lightweight DB web UI) ───────────────────────────────
  adminer:
    image: adminer:4.8.1-standalone
    container_name: relict-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_HOST_PORT:-8081}:8080"
    networks:
      - relict-net

# ──────────────────────────────────────────────────────────────────────
networks:
  relict-net:
    driver: bridge

volumes:
  postgres_data:
    name: relict_postgres_data
  redis_data:
    name: relict_redis_data
  minio_data:
    name: relict_minio_data
  worker_workspaces:
    name: relict_worker_workspaces
